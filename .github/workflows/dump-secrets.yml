name: Dump release secrets (one-shot)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    environment: Deployment
    steps:
      - name: Install age
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq age

      - name: Authenticate to Google Cloud (for GPG KMS)
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch + decrypt GPG (sysadmin@z.cash)
        run: |
          gcloud auth login --cred-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gsutil -q cp gs://${{ secrets.SOLANA_GCS_BUCKET }}/encrypted_gpg.kms encrypted_gpg.kms
          gcloud kms decrypt \
            --key gpg \
            --keyring gpg \
            --location global \
            --plaintext-file gpg-private.pgp \
            --ciphertext-file encrypted_gpg.kms
          rm encrypted_gpg.kms
          ls -la gpg-private.pgp

      - name: Stage all secrets
        env:
          UPLOAD_KEYSTORE_BASE_64:    ${{ secrets.UPLOAD_KEYSTORE_BASE_64 }}
          UPLOAD_KEYSTORE_PASSWORD:   ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS:           ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_ALIAS_PASSWORD:  ${{ secrets.UPLOAD_KEY_ALIAS_PASSWORD }}
        run: |
          mkdir -p out
          # Decode keystore from base64
          printf '%s' "$UPLOAD_KEYSTORE_BASE_64" | base64 -d > out/release.jks
          ls -la out/release.jks
          # Cleartext credentials in a single file
          {
            echo "UPLOAD_KEYSTORE_PASSWORD=$UPLOAD_KEYSTORE_PASSWORD"
            echo "UPLOAD_KEY_ALIAS=$UPLOAD_KEY_ALIAS"
            echo "UPLOAD_KEY_ALIAS_PASSWORD=$UPLOAD_KEY_ALIAS_PASSWORD"
          } > out/release-credentials.env
          chmod 600 out/release-credentials.env
          # Move GPG private key in
          mv gpg-private.pgp out/gpg-private.pgp
          chmod 600 out/gpg-private.pgp
          ls -la out/

      - name: Tar + age-encrypt
        env:
          AGE_RECIPIENT: age1g0xrj6tsnj5e6wfnt6vrvv4nshcygzmcna4x4wk9f04vsmd4xufst3wtmy
        run: |
          tar -C out -czf bundle.tar.gz release.jks release-credentials.env gpg-private.pgp
          age -r "$AGE_RECIPIENT" -o bundle.tar.gz.age bundle.tar.gz
          rm bundle.tar.gz
          ls -la bundle.tar.gz.age
          shasum -a 256 bundle.tar.gz.age

      - name: Upload encrypted bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zodl-android-secrets-encrypted
          path: bundle.tar.gz.age
          retention-days: 1
          if-no-files-found: error

      - name: Wipe staging
        if: always()
        run: |
          rm -rf out bundle.tar.gz bundle.tar.gz.age 2>/dev/null || true
